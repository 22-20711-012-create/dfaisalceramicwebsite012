<!DOCTYPE html>
<html>

<head>

<title>Ceramics - Home</title>

<style>

body{
    margin:0;
    font-family:Arial;
    background:#f8f6f1;
    text-align:center;
}

/* TITLE */

h1{
    color:#c9a227;
    font-size:60px;
    margin-top:25px;
    letter-spacing:5px;
}

/* SEARCH */

.search-box{
    margin-top:15px;
}

.search-box input{
    width:60%;
    max-width:500px;
    padding:12px;
    border:2px solid #d4af37;
    border-radius:25px;
    outline:none;
}

.search-box button{
    padding:12px 18px;
    border:none;
    background:#d4af37;
    color:white;
    border-radius:25px;
    cursor:pointer;
}

/* VIDEO (CENTER + LANDSCAPE) */

.video-container{
    display:flex;
    justify-content:center;
    margin-top:25px;
}

video{
    width:50%;
    max-width:650px;
    aspect-ratio:16/9;
    border-radius:18px;
    box-shadow:0 8px 22px rgba(0,0,0,0.18);
    object-fit:cover;
}

/* SECTION TITLE */

.section-title{
    margin-top:60px;
    font-size:35px;
    color:#b8860b;
}

/* STEPS */

.steps{
    display:flex;
    justify-content:center;
    flex-wrap:wrap;
    gap:25px;
    margin-top:25px;
}

/* CLEAN CLICKABLE CARD */

.step a{
    text-decoration:none;
    color:inherit;
}

.step{
    width:220px;
    background:white;
    padding:15px;
    border-radius:15px;
    box-shadow:0 4px 10px rgba(0,0,0,0.1);
    transition:0.3s;
}

.step:hover{
    transform:scale(1.05);
}

/* IMAGE SAME SIZE */

.step img{
    width:100%;
    height:180px;
    object-fit:cover;
    border-radius:10px;
}

.step h3{
    color:#c9a227;
    margin-top:10px;
}

/* OFFER */

.offer{
    margin-top:60px;
    background:#d4af37;
    color:white;
    padding:25px;
    font-size:28px;
    font-weight:bold;
}

/* FOOTER */

footer{
    margin-top:60px;
    padding:25px;
    border-top:2px solid #d4af37;
    color:#b8860b;
}

</style>

</head>

<!-- SEARCH FUNCTION -->

<script>

function searchFunction(){

    let input = document.getElementById("searchInput").value.toLowerCase();

    if(input.includes("shape")){
        document.getElementById("shaping").scrollIntoView({behavior:"smooth"});
    }

    else if(input.includes("dry")){
        document.getElementById("drying").scrollIntoView({behavior:"smooth"});
    }

    else if(input.includes("fire")){
        document.getElementById("firing").scrollIntoView({behavior:"smooth"});
    }

    else if(input.includes("finish")){
        document.getElementById("finishing").scrollIntoView({behavior:"smooth"});
    }

    else{
        alert("No matching section found");
    }

}

</script>
